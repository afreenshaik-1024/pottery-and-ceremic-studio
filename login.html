<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login & Signup</title>

<style>

body{
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f4ede4;
    font-family: Arial, sans-serif;
}

.container{
    width: 360px;
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.form-box{
    display: none;
}

.form-box.active{
    display: block;
}

h2{
    text-align: center;
    color: #5c4033;
    margin-bottom: 25px;
}

.input-box{
    margin-bottom: 18px;
}

.input-box input{
    width: 100%;
    padding: 14px;
    border: 1px solid #ccc;
    border-radius: 10px;
    outline: none;
    font-size: 15px;
}

.submit-btn{
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: #a2673f;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.submit-btn:hover{
    background: #5c4033;
}

.switch-text{
    text-align: center;
    margin-top: 18px;
}

.switch-text span{
    color: #a2673f;
    cursor: pointer;
    font-weight: bold;
}

</style>
</head>

<body>

<script>

function showSignup(){
    document.getElementById("loginForm").classList.remove("active");
    document.getElementById("signupForm").classList.add("active");
}

function showLogin(){
    document.getElementById("signupForm").classList.remove("active");
    document.getElementById("loginForm").classList.add("active");
}

</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login Page</title>

  <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-container">

    <form class="login-form">

        <h2>Login</h2>

        <input type="email" placeholder="Enter Email">

        <input type="password" placeholder="Enter Password">

        <button type="submit">Login</button>

        <p>
            Don't have an account?
            <a href="signup.html">Signup</a>
        </p>

    </form>

</div>

</body>
</html>
